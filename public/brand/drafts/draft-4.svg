  <defs>
    <mask id="d4-cuts">
      <rect width="208" height="64" fill="#fff"/>
      <g transform="translate(4 8) scale(0.75)" fill="none" stroke="#000" stroke-width="2.6" stroke-linecap="round">
        <path d="M 21.5 29 Q 25.5 25.5, 29.5 28.5"/>
        <path d="M 34.5 28.5 Q 38.5 25.5, 42.5 29"/>
