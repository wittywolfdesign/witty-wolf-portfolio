  <text id="wordmark" x="62" y="36.5" font-family="'Geist Mono Variable','Geist Mono',ui-monospace,'SF Mono',Menlo,monospace" font-size="13" font-weight="500" letter-spacing="0.1" fill="currentColor">Witty Wolf Design</text>
